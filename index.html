<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Ratings Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <!-- Highcharts -->
  <script src="https://code.highcharts.com/highcharts.js"></script>
  <script src="https://code.highcharts.com/modules/accessibility.js"></script>
</head>
<body>
  <header>
    <h1>Product Ratings Dashboard</h1>
  </header>
  <main>
    <p id="status">
      Loading product data...
    </p>
    <section>
      <h2>Average Rating by Category</h2>
      <div id="category-chart"></div>
      <p>
        This chart shows the average rating for each product category.
      </p>
    </section>
    <section>
      <h2>Top Rated Products</h2>
      <div id="products-chart"></div>
      <p>
        This chart displays the highest-rated products.
      </p>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
